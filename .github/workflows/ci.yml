name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest ruff
      - name: Run lint and tests in LAB8 directory
        working-directory: ./LAB8
        run: |
          ruff check . || true
          pytest -q
